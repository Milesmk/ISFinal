<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Boxing Game</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 20px;
    }

    .scoreboard {
        margin: 20px;
        font-size: 24px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
        margin-top: 30px;
    }

    button {
        padding: 20px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #333;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #555;
    }

    .result {
        margin-top: 30px;
        font-size: 20px;
        min-height: 40px;
    }

    .highlight {
        color: #00ffcc;
    }

    .reset {
        margin-top: 20px;
        padding: 10px 20px;
        background: crimson;
    }
</style>
</head>

<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html">Start Bootstrap</a>

        <!-- Removed useless extra Menu button -->

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">
                <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="fromScratch.html">From Scratch</a></li>
                <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="Ai.html">AI Shadow Boxing Game</a></li>
            </ul>
        </div>
    </div>
</nav>

<body>

<h1>🥊 Shadow Boxing Game</h1>

<div class="scoreboard">
    You: <span id="userScore">0</span> |
    App: <span id="appScore">0</span>
</div>

<div class="buttons">
    <div></div>
    <button onclick="play('up')">⬆️ Up</button>
    <div></div>

    <button onclick="play('left')">⬅️ Left</button>
    <div></div>
    <button onclick="play('right')">➡️ Right</button>

    <div></div>
    <button onclick="play('down')">⬇️ Down</button>
    <div></div>
</div>

<div class="result" id="result"></div>

<button class="reset" onclick="resetGame()">Reset Game</button>

<script>
    let userScore = 0;
    let appScore = 0;

    const directions = ["up", "down", "left", "right"];

    function play(userChoice) {
        const appChoice = directions[Math.floor(Math.random() * 4)];
        const resultDiv = document.getElementById("result");

        if (userChoice === appChoice) {
            userScore++;
            resultDiv.innerHTML =
                `✅ You guessed <span class="highlight">${userChoice}</span> and the app chose <span class="highlight">${appChoice}</span> — You score!`;
        } else {
            appScore++;
            resultDiv.innerHTML =
                `❌ You guessed <span class="highlight">${userChoice}</span> but the app chose <span class="highlight">${appChoice}</span> — App scores!`;
        }

        updateScore();
    }

    function updateScore() {
        document.getElementById("userScore").textContent = userScore;
        document.getElementById("appScore").textContent = appScore;
    }

    function resetGame() {
        userScore = 0;
        appScore = 0;
        updateScore();
        document.getElementById("result").textContent = "";
    }
</script>

</body>
</html>
